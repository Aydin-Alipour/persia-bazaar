name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip project
        run: |
          # آنزیپ فایل
          unzip -o persia-bazaar-main-git.zip
          
          # کپی تمام محتویات به ریشه پروژه
          if [ -d "persia-bazaar-main" ]; then
            cp -rf persia-bazaar-main/* . 2>/dev/null || true
            cp -rf persia-bazaar-main/.* . 2>/dev/null || true
          fi
          
          # نمایش ساختار برای دیباگ
          echo "=== Directory structure ==="
          ls -la
          echo "=== Android folder ==="
          ls -la android/ 2>/dev/null || echo "android folder not found"
          echo "=== Gradlew files ==="
          find . -name "gradlew*" 2>/dev/null || echo "No gradlew found"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: npm run build:mobile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Fix Gradle repositories
        run: |
          # حذف کامل مخازن Aliyun از تمام فایل‌های gradle
          find android -name "*.gradle" -type f -exec sed -i 's|maven { url "https://maven.aliyun.com/repository/central" }|mavenCentral()|g' {} \;
          find android -name "*.gradle" -type f -exec sed -i 's|maven { url "https://maven.aliyun.com/repository/google" }|google()|g' {} \;
          find android -name "*.gradle" -type f -exec sed -i 's|maven { url "https://maven.aliyun.com/repository/public" }|mavenCentral()|g' {} \;
          find android -name "*.gradle" -type f -exec sed -i 's|maven { url "https://maven.aliyun.com/repository/jcenter" }|maven { url "https://jcenter.bintray.com" }|g' {} \;

      - name: Create missing gradle wrapper
        run: |
          cd android
          
          # اگر gradlew وجود ندارد، آن را ایجاد کن
          if [ ! -f "gradlew" ]; then
            echo "Creating Gradle Wrapper from scratch..."
            
            # ایجاد پوشه wrapper
            mkdir -p gradle/wrapper
            
            # دانلود gradle-wrapper.jar
            wget -q https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar -O gradle/wrapper/gradle-wrapper.jar
            
            # ایجاد فایل gradle-wrapper.properties
            cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF
            
            # ایجاد فایل gradlew
            cat > gradlew << 'EOF'
#!/bin/sh
#
# Copyright © 2015-2021 the original authors.
#
# Licensed under the Apache License, Version 2.0 (the "License");
# you may not use this file except in compliance with the License.
# You may obtain a copy of the License at
#
#      https://www.apache.org/licenses/LICENSE-2.0
#
# Unless required by applicable law or agreed to in writing, software
# distributed under the License is distributed on an "AS IS" BASIS,
# WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
# See the License for the specific language governing permissions and
# limitations under the License.
#

##############################################################################
#
#   Gradle start up script for POSIX generated by Gradle.
#
#   Important for running:
#
#   (1) You need a POSIX-compliant shell to run this script. If your /bin/sh is
#       noncompliant, but you have some other compliant shell such as ksh or
#       bash, then you need to set the SHELL environment variable to point to
#       that shell before running this script, e.g.:
#           SHELL=/usr/bin/ksh gradlew
#
#       Or, if you have a compliant shell but it's not the default, you can
#       set the GRADLE_OPTS environment variable to point to the shell invocation
#       command. For example, if you use ksh and your ksh path is `/usr/bin/ksh`:
#           GRADLE_OPTS="-Dorg.gradle.shell=/usr/bin/ksh"
#
#       If you don't have any compliant shell, you can download GNU bash:
#           https://www.gnu.org/software/bash/
#
#   (2) This script attempts to find the Gradle home directory,
#       which can be defined with the GRADLE_HOME environment variable. If it is
#       not defined, it will look for a 'gradle' command in the PATH.
#
#       If neither is found, the script will print an error message and exit.
#
##############################################################################

# Attempt to set APP_HOME

# Resolve links: $0 may be a link
app_path=$0

# Need this for daisy-chained symlinks.
while
    APP_HOME=${app_path%"${app_path##*/}"}  # leaves a trailing /; empty if no leading path
    [ -h "$app_path" ]
do
    ls=$(ls -ld "$app_path")
    link=${ls#*' -> '}
    case $link in             #(
      /*)   app_path=$link ;; #(
      *)    app_path=$APP_HOME$link ;;
    esac
done

APP_HOME=$(cd "${APP_HOME:-./}" && pwd -P) || exit

APP_NAME="Gradle"
APP_BASE_NAME=${0##*/}

# Add default JVM options here. You can also use JAVA_OPTS and GRADLE_OPTS to pass JVM options to this script.
DEFAULT_JVM_OPTS='"-Xmx64m" "-Xms64m"'

# Use the maximum available, or set MAX_FD != -1 to use that value.
MAX_FD=maximum

warn () {
    echo "$*"
} >&2

die () {
    echo
    echo "$*"
    echo
    exit 1
} >&2

# OS specific support (must be 'true' or 'false').
cygwin=false
msys=false
darwin=false
nonstop=false
case "$(uname)" in
  CYGWIN* )
    cygwin=true
    ;;
  Darwin* )
    darwin=true
    ;;
  MSYS* | MINGW* )
    msys=true
    ;;
  NONSTOP* )
    nonstop=true
    ;;
esac

CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar

# Determine the Java command to use to start the JVM.
if [ -n "$JAVA_HOME" ] ; then
    if [ -x "$JAVA_HOME/jre/sh/java" ] ; then
        # IBM's JDK on AIX uses strange locations for the executables
        JAVACMD=$JAVA_HOME/jre/sh/java
    else
        JAVACMD=$JAVA_HOME/bin/java
    fi
    if [ ! -x "$JAVACMD" ] ; then
        die "ERROR: JAVA_HOME is set to an invalid directory: $JAVA_HOME

Please set the JAVA_HOME variable in your environment to match the
location of your Java installation."
    fi
else
    JAVACMD=java
    which java >/dev/null 2>&1 || die "ERROR: JAVA_HOME is not set and no 'java' command could be found in your PATH.

Please set the JAVA_HOME variable in your environment to match the
location of your Java installation."
fi

# Increase the maximum file descriptors if we can.
if ! "$cygwin" && ! "$darwin" && ! "$nonstop" ; then
    case $MAX_FD in #(
      max*)
        MAX_FD=$(ulimit -H -n) ||
            warn "Could not query maximum file descriptor limit"
    esac
    case $MAX_FD in  #(
      '' | soft) :;; #(
      *)
        ulimit -n "$MAX_FD" ||
            warn "Could not set maximum file descriptor limit to $MAX_FD"
    esac
fi

# Collect all arguments for the java command, stacking in reverse order:
#   * args from the command line
#   * the main class name
#   * -classpath
#   * -D...appname settings
#   * --module-path (only if dedicated module module-path given)
#   * --module-path entries (only if dedicated module module-path given)
#   * ... and any other arguments

# For Gradle 7.0+ we support module-path for Java modules. The _JAVA_OPTIONS pattern is deprecated but
# might still be set by the environment, so we need to do processing for that pattern.
_JAVA_OPTIONS=$JAVA_OPTS
APP_ARGS=
ERROR_CODE=0

# Collect the arguments for the java command.
# We follow the shell convention of replacing '--' with '--' to signal the end of arguments.
# Also note that '--' is not part of the linking arguments, it is parsed specially by
# getopt.

while [ $# -gt 0 ]; do
    case "$1" in
        --module-path)
            MODULE_PATH=$2
            shift 2
            ;;
        --module-path=*)
            MODULE_PATH=${1#*=}
            shift
            ;;
        --)
            shift
            APP_ARGS=$@
            break
            ;;
        *)
            APP_ARGS="$APP_ARGS $1"
            shift
            ;;
    esac
done

# For Cygwin, switch paths to Windows format before running java
if $cygwin ; then
    APP_HOME=$(cygpath --path --mixed "$APP_HOME")
    CLASSPATH=$(cygpath --path --mixed "$CLASSPATH")
    
    JAVACMD=$(cygpath --unix "$JAVACMD")

    # We build the pattern for arguments to be converted via cygpath
    ROOTDIRSRAW=$(find -L / -maxdepth 1 -mindepth 1 -type d 2>/dev/null || true)
    SEP=""
    for dir in $ROOTDIRSRAW ; do
        ROOTDIRS="$ROOTDIRS$SEP$dir"
        SEP="|"
    done
    OURCYGPATTERN="(^($ROOTDIRS))"
    # Add a user-defined pattern to the cygpath arguments
    if [ "$GRADLE_CYGPATTERN" != "" ] ; then
        OURCYGPATTERN="$OURCYGPATTERN|($GRADLE_CYGPATTERN)"
    fi
    # Now convert the arguments - sloppy secure assume anything containing a "-" is not a directory
    i=0
    for arg in "$@" ; do
        case $arg in
            -*)
                ;;
            *)
                re="^($OURCYGPATTERN|//.*)$"
                if [[ $arg =~ $re ]]; then
                    arg=$(cygpath --path --ignore --mixed "$arg")
                fi
                ;;
        esac
        ARGS[$i]=$(cygpath --path --ignore --mixed "$arg")
        i=$((i+1))
    done
else
    ARGS=("$@")
fi

# Collect module path information also for the embedded Gradle runtime.
if [ -n "$MODULE_PATH" ] ; then
    # For Gradle modules, the module path is relative to the 'modules' directory.
    # For a runtime build of Gradle, it's relative to the 'lib' directory.
    GRADLE_MODULE_PATH=""
    if [ -d "$APP_HOME/modules" ]; then
        GRADLE_MODULE_PATH="$APP_HOME/modules"
    elif [ -d "$APP_HOME/lib" ]; then
        GRADLE_MODULE_PATH="$APP_HOME/lib"
    fi
    MODULE_PATH="$MODULE_PATH:$GRADLE_MODULE_PATH"
    CLASSPATH="$CLASSPATH":"$GRADLE_MODULE_PATH"
fi

# Collect all arguments for the java command;
#   * $DEFAULT_JVM_OPTS, $JAVA_OPTS, and $GRADLE_OPTS can contain fragments of
#     shell script including quotes and variable substitutions, so put them in
#     double quotes to make sure that they get re-expanded; and
#   * put everything else in double quotes as well, to prevent misinterpreting
#     spaces in arguments.
JAVA_OPTS="$JAVA_OPTS $GRADLE_OPTS"
DEFAULT_JVM_OPTS='"$DEFAULT_JVM_OPTS"'
JAVA_OPTS='"$JAVA_OPTS"'
APP_ARGS=$(echo "$APP_ARGS" | tr '\n' ' ')

# For Gradle 8.x, we need to pass the arguments through to the Java launcher.
# We need to handle 8.x specific features like module-path.

if [ -n "$JAVA_OPTS" ] || [ -n "$DEFAULT_JVM_OPTS" ]; then
    JAVA_OPTS="$JAVA_OPTS $DEFAULT_JVM_OPTS"
fi

# Execute Gradle
"$JAVACMD" \
    ${JAVA_OPTS:+$JAVA_OPTS} \
    ${DEFAULT_JVM_OPTS:+$DEFAULT_JVM_OPTS} \
    -classpath "$CLASSPATH" \
    org.gradle.wrapper.GradleWrapperMain \
    "$APP_ARGS"

ERROR_CODE=$?

# Exit code 0 means success, 1 means some failure, 2 means the Gradle
# wrapper or Gradle itself failed. We should exit with the same code.

exit $ERROR_CODE
EOF
            
            # تنظیم دسترسی اجرایی برای gradlew
            chmod +x gradlew
            
            echo "Gradle Wrapper created successfully"
          else
            echo "gradlew already exists"
            chmod +x gradlew
          fi
          
          # نمایش وضعیت نهایی
          echo "=== Gradle Wrapper status ==="
          ls -la gradlew
          ls -la gradle/wrapper/

      - name: Fix duplicate splash resource
        run: |
          rm -f android/app/src/main/res/drawable/splash.png
          rm -f android/app/src/main/res/drawable-land/splash.png 2>/dev/null || true

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "sdk.dir=$ANDROID_HOME" > local.properties 2>/dev/null || true

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          echo "Starting Gradle build..."
          ./gradlew clean --no-daemon
          ./gradlew assembleDebug --no-daemon --stacktrace
          
          # بررسی وجود فایل APK
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "✅ APK built successfully!"
            ls -la app/build/outputs/apk/debug/
          else
            echo "❌ APK not found!"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
