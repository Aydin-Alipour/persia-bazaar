name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip persia-bazaar-main-git.zip
          cp -r persia-bazaar-main/. .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: npm run build:mobile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Fix Gradle repositories
        run: |
          sed -i 's|https://maven.aliyun.com/repository/central|https://repo1.maven.org/maven2|g' android/build.gradle
          sed -i 's|https://maven.aliyun.com/repository/google|https://maven.google.com|g' android/build.gradle
          sed -i 's|https://maven.aliyun.com/repository/public|https://repo1.maven.org/maven2|g' android/build.gradle

      - name: Build APK
        run: |
          cd android
          sed -i 's/\r//' gradlew
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
